name: Build and Package GULA Microservices

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # GitHub repository owner name in lowercase
  OWNER: jdbruh18

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: gula-gateway
            context: ./backend/gula-gateway
          - name: gula-auth
            context: ./backend/gula-auth
          - name: gula-study
            context: ./backend/gula-study
          - name: gula-patient
            context: ./backend/gula-patient
          - name: gula-ai
            context: ./backend/gula-ai
          - name: gula-dimse
            context: ./backend/gula-dimse

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to the Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.service.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
